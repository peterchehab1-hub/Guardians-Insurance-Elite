<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Guardians Insurance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-white">
    <nav class="bg-[#1e40af] text-white p-4 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="text-xl font-black tracking-tighter uppercase">Guardians Dashboard</span>
            <div class="flex items-center space-x-6">
                <span id="welcomeMsg" class="text-sm text-gray-300"></span>
                <button onclick="logout()" class="bg-[#06b6d4] px-4 py-2 rounded-lg text-sm font-bold hover:bg-[#0891b2] transition-all">Sign Out</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-12 px-4">
        <div class="flex flex-col md:flex-row justify-between items-end mb-8 border-b border-gray-100 pb-6">
            <div>
                <h1 class="text-3xl font-black text-[#1e40af]">My Active Policies</h1>
                <p class="text-gray-400 mt-2">Manage your protection plans and documents.</p>
            </div>
            <div class="text-[#06b6d4] font-bold text-sm bg-blue-50 px-4 py-2 rounded-full border border-blue-100">
                Coverage Status: Secure
            </div>
        </div>

        <div id="policyContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Dynamic Policies -->
        </div>

        <div id="emptyState" class="hidden text-center py-20 bg-white rounded-3xl border border-dashed border-gray-300">
            <p class="text-gray-400">No active policies found. Please contact your agent.</p>
        </div>
    </main>

    <!-- PDF Viewer Modal -->
    <div id="pdfModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closePdf()"></div>
        <div class="bg-white w-full max-w-5xl h-[85vh] rounded-3xl overflow-hidden shadow-2xl relative z-10 flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-[#f8fafc]">
                <div>
                    <h3 class="font-black text-[#1e3a5f] uppercase text-sm tracking-widest">Document Viewer</h3>
                    <p id="modalDocTitle" class="text-xs text-gray-400"></p>
                </div>
                <button onclick="closePdf()" class="bg-gray-200 hover:bg-gray-300 p-2 rounded-full transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <iframe id="pdfFrame" class="flex-grow w-full border-0"></iframe>
            <div class="p-6 bg-white border-t flex justify-end">
                <a id="pdfDownloadBtn" href="#" download class="bg-[#1e3a5f] text-white px-8 py-3 rounded-xl font-bold hover:bg-black transition-all">Download Copy</a>
            </div>
        </div>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('guardians_session'));
        if (!session || session.role !== 'client') {
            window.location.href = './login.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const users = JSON.parse(localStorage.getItem('guardians_users') || '[]');
            const currentUser = users.find(u => u.username === session.username);
            
            document.getElementById('welcomeMsg').textContent = `Hello, ${session.username}`;
            
            if (currentUser && currentUser.policies && currentUser.policies.length > 0) {
                renderPolicies(currentUser.policies);
            } else {
                document.getElementById('emptyState').classList.remove('hidden');
            }
        });

        function renderPolicies(policies) {
            const container = document.getElementById('policyContainer');
            container.innerHTML = policies.map(p => `
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 hover:shadow-xl transition-all group">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-12 h-12 bg-[#06b6d4]/10 text-[#06b6d4] rounded-2xl flex items-center justify-center text-2xl font-bold">
                            ${p.type.charAt(0)}
                        </div>
                        <span class="bg-blue-50 text-[#06b6d4] px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border border-blue-100">Valid</span>
                    </div>
                    <h3 class="text-xl font-black text-[#1e40af] mb-1">${p.type}</h3>
                    <p class="text-gray-400 text-xs mb-6">ID: ${p.id || 'N/A'}</p>
                    
                    <div class="space-y-3 mb-8">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-400">Premium</span>
                            <span class="font-bold text-[#1e40af]">${p.premium}</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-400">Expires</span>
                            <span class="font-bold text-gray-600">${p.expiry}</span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="viewPdf('${p.type}')" class="bg-gray-50 text-text-dark py-3 rounded-xl font-bold text-xs border border-gray-100 hover:bg-gray-100 transition-all">PDF View</button>
                        <a href="https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf" download="${p.type}_Policy.pdf" class="bg-[#06b6d4] text-white py-3 rounded-xl font-bold text-xs text-center hover:bg-[#0891b2] transition-all flex items-center justify-center">Download</a>
                    </div>
                </div>
            `).join('');
        }

        function viewPdf(title) {
            const modal = document.getElementById('pdfModal');
            const frame = document.getElementById('pdfFrame');
            const btn = document.getElementById('pdfDownloadBtn');
            const titleEl = document.getElementById('modalDocTitle');
            
            titleEl.textContent = title + " Policy Document";
            frame.src = 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf';
            btn.href = 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf';
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closePdf() {
            document.getElementById('pdfModal').classList.add('hidden');
            document.getElementById('pdfFrame').src = '';
            document.body.style.overflow = 'auto';
        }

        function logout() {
            localStorage.removeItem('guardians_session');
            window.location.href = './login.html';
        }
    </script>
</body>
</html>
