<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login | Guardians Insurance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <h1 class="text-[#1e40af] text-3xl font-black mb-2 tracking-tight">GUARDIANS <span class="text-[#06b6d4]">PORTAL</span></h1>
            <p class="text-gray-400 font-medium italic">Secure Access for Clients & Staff</p>
        </div>
        <div class="bg-white p-10 rounded-3xl shadow-xl border border-gray-100">
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Username or Email</label>
                    <input type="text" id="username" required placeholder="guardians" class="w-full p-4 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#06b6d4]" />
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Password</label>
                    <input type="password" id="password" required placeholder="2024" class="w-full p-4 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#06b6d4]" />
                </div>
                <button type="submit" class="w-full bg-[#06b6d4] text-white py-4 rounded-xl font-bold text-lg hover:bg-[#0891b2] transition-all shadow-lg active:scale-95">Log in</button>
            </form>
            <div id="errorMsg" class="mt-4 text-center text-red-500 text-sm hidden">Invalid credentials. Please try again.</div>
        </div>
        <div class="mt-8 text-center">
            <a href="./index.html" class="text-gray-400 text-sm hover:text-[#1e3a5f] transition-colors">← Return to Public Site</a>
        </div>
    </div>

    <script>
        // Initialize default storage if empty
        if (!localStorage.getItem('guardians_users')) {
            localStorage.setItem('guardians_users', JSON.stringify([
                { 
                    username: 'client@example.com', 
                    password: 'password123', 
                    role: 'client',
                    policies: [
                        { id: 'POL-101', type: 'Car Insurance', premium: '$450.00', expiry: '2025-12-01' },
                        { id: 'POL-102', type: 'Medical Plan', premium: '$120.00/mo', expiry: '2026-06-15' }
                    ]
                }
            ]));
        }

        function handleLogin(e) {
            e.preventDefault();
            const userVal = document.getElementById('username').value.trim();
            const passVal = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.classList.add('hidden');

            // Admin Check
            if (userVal === 'guardians' && passVal === '2024') {
                localStorage.setItem('guardians_session', JSON.stringify({ username: 'admin', role: 'admin' }));
                window.location.href = './admin.html';
                return;
            }

            // Client Check
            const users = JSON.parse(localStorage.getItem('guardians_users') || '[]');
            const foundUser = users.find(u => (u.username === userVal || u.email === userVal) && u.password === passVal);

            if (foundUser) {
                localStorage.setItem('guardians_session', JSON.stringify({ 
                    username: foundUser.username, 
                    role: 'client' 
                }));
                window.location.href = './dashboard.html';
            } else {
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
