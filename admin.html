<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Guardians Insurance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">
    <!-- Sidebar -->
    <aside class="w-full md:w-72 bg-[#1e40af] text-white flex flex-col p-8 space-y-12 shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-[#06b6d4] p-2 rounded-xl">🛡️</div>
            <span class="text-xl font-black tracking-tighter uppercase">Guardians Admin</span>
        </div>
        
        <nav class="flex-grow space-y-2">
            <button onclick="switchView('dashboard')" id="nav-dashboard" class="w-full text-left px-4 py-3 rounded-xl font-bold bg-[#06b6d4] transition-all">Dashboard</button>
            <button onclick="switchView('manage')" id="nav-manage" class="w-full text-left px-4 py-3 rounded-xl font-bold hover:bg-white/10 transition-all">Add/Edit Client</button>
        </nav>
        
        <div class="pt-8 border-t border-white/10 space-y-4">
            <div class="text-xs text-gray-400 font-bold uppercase tracking-widest">Logged in as</div>
            <div class="font-bold flex items-center space-x-2">
                <div class="w-8 h-8 bg-white/10 rounded-full flex items-center justify-center text-xs">AD</div>
                <span>Administrator</span>
            </div>
            <button onclick="logout()" class="w-full text-left text-white/40 hover:text-red-400 text-sm transition-colors">Sign Out</button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-grow p-8 md:p-12 overflow-y-auto bg-white text-[#1e293b]">
        
        <!-- Dashboard View -->
        <div id="view-dashboard" class="space-y-12">
            <div class="flex justify-between items-end">
                <div>
                    <h1 class="text-4xl font-black text-[#1e40af]">Global Overview</h1>
                    <p class="text-gray-400 mt-2">Monitoring all active client policies across Lebanon.</p>
                </div>
                <div class="flex space-x-4">
                    <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm text-center">
                        <div id="stat-clients" class="text-2xl font-black text-[#06b6d4]">0</div>
                        <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Total Clients</div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th class="p-6 text-xs font-bold uppercase text-gray-400">Client / Username</th>
                            <th class="p-6 text-xs font-bold uppercase text-gray-400">Active Policies</th>
                            <th class="p-6 text-xs font-bold uppercase text-gray-400 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="client-table-body">
                        <!-- Dynamic Rows -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add/Edit View -->
        <div id="view-manage" class="hidden max-w-2xl">
            <h1 class="text-4xl font-black text-[#1e40af] mb-8">Client Management</h1>
            <div class="bg-white p-10 rounded-3xl shadow-xl border border-gray-100">
                <h2 id="form-title" class="text-xl font-bold text-[#1e40af] mb-8 flex items-center">
                    <span class="bg-[#06b6d4]/10 text-[#06b6d4] p-2 rounded-lg mr-4">+</span>
                    Register New Client
                </h2>
                <form onsubmit="handleUserSubmit(event)" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Username</label>
                            <input type="text" id="m-username" required class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl" placeholder="johndoe"/>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Password</label>
                            <input type="password" id="m-password" required class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl" placeholder="••••••••"/>
                        </div>
                    </div>
                    
                    <div class="pt-6 border-t">
                        <h3 class="font-bold text-[#1e40af] mb-4">Initial Policy Details</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Policy Type</label>
                                <select id="m-p-type" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl">
                                    <option>Car Insurance</option>
                                    <option>Home Insurance</option>
                                    <option>Medical Care</option>
                                    <option>Life Protection</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Premium ($)</label>
                                <input type="text" id="m-p-premium" required class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl" placeholder="750.00"/>
                            </div>
                        </div>
                    </div>

                    <div class="flex space-x-4 pt-8">
                        <button type="submit" class="flex-grow bg-[#06b6d4] text-white py-4 rounded-xl font-bold text-lg hover:bg-[#0891b2] transition-all shadow-lg">Save Client Data</button>
                        <button type="button" onclick="switchView('dashboard')" class="px-8 bg-gray-100 text-gray-500 py-4 rounded-xl font-bold hover:bg-gray-200 transition-all">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <script>
        const session = JSON.parse(localStorage.getItem('guardians_session'));
        if (!session || session.role !== 'admin') {
            window.location.href = './login.html';
        }

        let users = JSON.parse(localStorage.getItem('guardians_users') || '[]');

        function renderDashboard() {
            const tableBody = document.getElementById('client-table-body');
            const statClients = document.getElementById('stat-clients');
            
            statClients.textContent = users.length;
            
            tableBody.innerHTML = users.map((u, i) => `
                <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                    <td class="p-6">
                        <div class="font-bold text-[#1e40af]">${u.username}</div>
                        <div class="text-[10px] text-gray-400 font-mono">ID: ${u.username.substring(0,3).toUpperCase()}-${100+i}</div>
                    </td>
                    <td class="p-6">
                        <div class="flex items-center space-x-2">
                            <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-xs font-black">${u.policies ? u.policies.length : 0}</span>
                            <span class="text-xs text-gray-400">active items</span>
                        </div>
                    </td>
                    <td class="p-6 text-right">
                        <button onclick="editClient(${i})" class="text-[#06b6d4] font-bold text-xs mr-4 hover:underline">Edit</button>
                        <button onclick="deleteClient(${i})" class="text-red-400 font-bold text-xs hover:text-red-600">Remove</button>
                    </td>
                </tr>
            `).join('');
        }

        function switchView(view) {
            const dashView = document.getElementById('view-dashboard');
            const manageView = document.getElementById('view-manage');
            const navDash = document.getElementById('nav-dashboard');
            const navManage = document.getElementById('nav-manage');

            if (view === 'dashboard') {
                dashView.classList.remove('hidden');
                manageView.classList.add('hidden');
                navDash.classList.add('bg-[#06b6d4]');
                navManage.classList.remove('bg-[#06b6d4]');
                renderDashboard();
            } else {
                dashView.classList.add('hidden');
                manageView.classList.remove('hidden');
                navDash.classList.remove('bg-[#06b6d4]');
                navManage.classList.add('bg-[#06b6d4]');
            }
        }

        function handleUserSubmit(e) {
            e.preventDefault();
            const username = document.getElementById('m-username').value;
            const pass = document.getElementById('m-password').value;
            const pType = document.getElementById('m-p-type').value;
            const pPremium = '$' + document.getElementById('m-p-premium').value;

            const newUser = {
                username: username,
                password: pass,
                role: 'client',
                policies: [
                    { 
                        id: 'POL-' + Math.floor(Math.random() * 900 + 100), 
                        type: pType, 
                        premium: pPremium, 
                        expiry: '2026-01-01' 
                    }
                ]
            };

            users.push(newUser);
            localStorage.setItem('guardians_users', JSON.stringify(users));
            e.target.reset();
            alert('Client successfully registered!');
            switchView('dashboard');
        }

        function deleteClient(index) {
            if(confirm('Are you sure you want to remove this client?')) {
                users.splice(index, 1);
                localStorage.setItem('guardians_users', JSON.stringify(users));
                renderDashboard();
            }
        }

        function editClient(index) {
            // Pre-fill form and switch view
            const user = users[index];
            document.getElementById('m-username').value = user.username;
            document.getElementById('m-password').value = user.password;
            document.getElementById('form-title').innerHTML = `<span class="bg-[#06b6d4]/10 text-[#06b6d4] p-2 rounded-lg mr-4">✎</span> Edit Existing Client`;
            switchView('manage');
        }

        function logout() {
            localStorage.removeItem('guardians_session');
            window.location.href = './login.html';
        }

        renderDashboard();
    </script>
</body>
</html>
