<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard | Guardians Insurance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #1e3a5f; }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">
    <!-- Sidebar -->
    <aside class="w-full md:w-64 sidebar text-white flex flex-col p-8 space-y-10">
        <div class="text-xl font-black tracking-tighter">GUARDIANS</div>
        <nav class="flex-grow space-y-4">
            <a href="#" class="block font-bold text-[#0d9488]">Dashboard</a>
            <a href="#" class="block text-white/60 hover:text-white transition-colors">My Policies</a>
            <a href="#" class="block text-white/60 hover:text-white transition-colors">Downloads</a>
        </nav>
        <button onclick="logout()" class="text-left text-white/40 hover:text-white text-sm">Sign Out</button>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-8 md:p-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-black text-[#1e3a5f]">Welcome Back</h1>
                <p id="user-email" class="text-gray-400"></p>
            </div>
        </header>

        <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-6">Active Policies</h2>
        <div id="policy-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Dynamic Content -->
        </div>
    </main>

    <!-- PDF Modal -->
    <div id="pdf-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closePdf()"></div>
        <div class="bg-white w-full max-w-4xl h-[80vh] rounded-3xl overflow-hidden shadow-2xl relative z-10 flex flex-col">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="font-bold text-[#1e3a5f]">Policy Document</h3>
                <button onclick="closePdf()" class="text-gray-400">Close</button>
            </div>
            <iframe id="pdf-frame" class="flex-grow w-full border-0"></iframe>
            <div class="p-6 bg-gray-50 flex justify-end">
                <a id="pdf-download" href="#" download class="bg-[#0d9488] text-white px-6 py-2 rounded-lg font-bold">Download Copy</a>
            </div>
        </div>
    </div>

    <script>
        const policies = JSON.parse(localStorage.getItem('policies') || '[]');
        const defaultPolicies = [
            { id: 1, type: 'Car Insurance', premium: '$450.00', expiry: '2025-12-01', status: 'Active' },
            { id: 2, type: 'Medical Plan', premium: '$120.00/mo', expiry: '2026-06-15', status: 'Active' }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const email = localStorage.getItem('currentUser') || 'client@example.com';
            document.getElementById('user-email').textContent = email;
            renderPolicies();
        });

        function renderPolicies() {
            const list = document.getElementById('policy-list');
            const data = policies.length > 0 ? policies : defaultPolicies;
            
            list.innerHTML = data.map(p => `
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-start mb-6">
                        <span class="bg-[#0d9488]/10 text-[#0d9488] px-3 py-1 rounded-full text-xs font-bold">${p.status || 'Active'}</span>
                        <span class="text-gray-300 text-xs">ID: ${p.id}</span>
                    </div>
                    <h3 class="text-xl font-bold text-[#1e3a5f] mb-1">${p.type}</h3>
                    <p class="text-2xl font-black text-[#1e3a5f] mb-6">${p.premium}</p>
                    <div class="text-sm text-gray-400 mb-8">Expires on: <span class="text-gray-600 font-medium">${p.expiry}</span></div>
                    <button onclick="viewPdf()" class="w-full bg-[#f8fafc] text-[#1e3a5f] py-3 rounded-xl font-bold border border-gray-100 hover:bg-gray-100 transition-all">View PDF</button>
                </div>
            `).join('');
        }

        function viewPdf() {
            document.getElementById('pdf-modal').classList.remove('hidden');
            document.getElementById('pdf-frame').src = 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf';
        }

        function closePdf() {
            document.getElementById('pdf-modal').classList.add('hidden');
            document.getElementById('pdf-frame').src = '';
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = './login.html';
        }
    </script>
</body>
</html>
